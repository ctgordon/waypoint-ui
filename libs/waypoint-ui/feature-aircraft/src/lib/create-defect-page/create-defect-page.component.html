<section class="create-defect-page">
  <a routerLink="../.." class="back-link">← Back to aircraft</a>

  <wp-page-header
    eyebrow="Defects"
    title="Report defect"
    description="Record a new aircraft defect for maintenance review."
  />

  <mat-card class="create-defect-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Defect title</mat-label>
          <input
            matInput
            formControlName="title"
            placeholder="Landing light inoperative"
          />

          @if (form.controls.title.hasError('required')) {
            <mat-error>Title is required</mat-error>
          }

          @if (form.controls.title.hasError('maxlength')) {
            <mat-error>Title is too long</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Severity</mat-label>
          <mat-select formControlName="severity">
            <mat-option value="MINOR">Minor</mat-option>
            <mat-option value="MAJOR">Major</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Description</mat-label>
          <textarea
            matInput
            formControlName="description"
            rows="5"
            placeholder="Add details, symptoms, or inspection notes..."
          ></textarea>
        </mat-form-field>

        @if (errorMessage) {
          <p class="form-error">{{ errorMessage }}</p>
        }

        <div class="form-actions">
          <a mat-button routerLink="../..">
            Cancel
          </a>

          <button
            mat-flat-button
            color="primary"
            type="submit"
            [disabled]="isSubmitting"
          >
            {{ isSubmitting ? 'Reporting...' : 'Report defect' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</section>
