<wp-section-panel
  title="Maintenance"
  description="Upcoming and active maintenance events for this aircraft."
>
  <ng-container *ngIf="events$ | async as events">
    <wp-empty-state
      *ngIf="events.length === 0"
      icon="event_available"
      title="No maintenance events"
      message="This aircraft has no scheduled maintenance events."
    />

    <div class="maintenance-list" *ngIf="events.length > 0">
      <article class="maintenance-item" *ngFor="let event of events">
        <div class="maintenance-item__main">
          <div>
            <h3>{{ event.title }}</h3>

            <p *ngIf="event.notes">
              {{ event.notes }}
            </p>

            <small>
              Created {{ event.createdAt | date: 'mediumDate' }}
            </small>
          </div>

          <div class="maintenance-item__status">
            <wp-status-pill
              [label]="formatLabel(event.eventType)"
              tone="neutral"
            />

            <wp-status-pill
              [label]="formatLabel(event.status)"
              [tone]="statusTone(event.status)"
            />

            <wp-status-pill
              [label]="dueLabel(event.dueDate)"
              [tone]="dueTone(event.dueDate)"
            />
          </div>
        </div>
      </article>
    </div>
  </ng-container>
</wp-section-panel>
