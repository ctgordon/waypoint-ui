<section class="aircraft-list">
  <wp-page-header
    eyebrow="Fleet"
    title="Aircraft"
    description="View aircraft records, defects, documents, and maintenance status."
  />

  <div class="row g-3">
    <div
      class="col-12 col-md-6 col-xl-4"
      *ngFor="let item of aircraft$ | async"
    >
      <a class="aircraft-card-link" [routerLink]="item.aircraftId">
        <mat-card class="aircraft-card">
          <mat-card-content>
            <div class="aircraft-card__top">
              <div>
                <h2>{{ item.registration }}</h2>
                <p>{{ item.manufacturer }} {{ item.model }}</p>
              </div>

              <wp-status-pill
                [label]="item.status"
                tone="scheduled"
              />
            </div>

            <dl>
              <div>
                <dt>Serial</dt>
                <dd>{{ item.serialNumber || 'Not recorded' }}</dd>
              </div>
            </dl>
          </mat-card-content>
        </mat-card>
      </a>
    </div>
  </div>
</section>
