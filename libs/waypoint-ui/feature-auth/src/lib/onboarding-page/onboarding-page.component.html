<section class="onboarding-page">
  <mat-card>
    <mat-card-content>
      <h1>Set up Waypoint</h1>
      <p>Create your organisation to start managing aircraft.</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Organisation name</mat-label>
          <input matInput formControlName="organisationName" />

          @if (form.controls.organisationName.hasError('required')) {
            <mat-error>Organisation name is required</mat-error>
          }
        </mat-form-field>

        @if (errorMessage) {
          <p class="form-error">{{ errorMessage }}</p>
        }

        <button
          mat-flat-button
          color="primary"
          type="submit"
          [disabled]="isSubmitting"
        >
          {{ isSubmitting ? 'Creating...' : 'Create account' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
