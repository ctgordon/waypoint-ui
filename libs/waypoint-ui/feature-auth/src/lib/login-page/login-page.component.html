<div class="login-page">
  <section class="login-page__brand">
    <div class="brand-mark">W</div>
    <h1>Waypoint MX</h1>
    <p>Calm maintenance control for aircraft, defects, documents, and compliance.</p>
  </section>

  <section class="login-page__panel">
    <mat-card class="login-card">
      <mat-card-header>
        <mat-card-title>Sign in</mat-card-title>
        <mat-card-subtitle>Local development access</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Email</mat-label>
          <input matInput value="chris@example.com" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Password</mat-label>
          <input matInput type="password" value="password" />
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions align="end">
        <button mat-flat-button color="primary" type="button" (click)="signIn()">
          Sign in
        </button>
      </mat-card-actions>
    </mat-card>
  </section>
</div>
