@if (summary$ | async; as summary) {
  <section>
    <wp-page-header
      eyebrow="Fleet overview"
      [title]="summary.organisationId"
      description="Current operational maintenance and compliance status."
    />

    <div class="row g-3">
      <div class="col-12 col-md-3">
        <wp-metric-card
          label="Total aircraft"
          [value]="summary.totalAircraft"
        />
      </div>

      <div class="col-12 col-md-3">
        <wp-metric-card
          label="Open defects"
          [value]="summary.openDefects"
        />
      </div>

      <div class="col-12 col-md-3">
        <wp-metric-card
          label="Due soon"
          [value]="summary.openDefects"
        />
      </div>

      <div class="col-12 col-md-3">
        <wp-metric-card
          label="In progress defects"
          [value]="summary.openDefects"
        />
      </div>
    </div>
  </section>
}
