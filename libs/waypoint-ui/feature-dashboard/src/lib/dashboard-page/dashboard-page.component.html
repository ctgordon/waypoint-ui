<section
  class="dashboard"
  *ngIf="summary$ | async as summary"
>
  <header class="dashboard__header">
    <div>
      <p class="eyebrow">Fleet overview</p>

      <h1>
        {{ summary.organisationName }}
      </h1>

      <p>
        Current operational maintenance and compliance status.
      </p>
    </div>
  </header>

  <div class="row g-3">
    <div class="col-12 col-md-3">
      <mat-card>
        <mat-card-content>
          <p>Total aircraft</p>
          <h2>{{ summary.totalAircraft }}</h2>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="col-12 col-md-3">
      <mat-card>
        <mat-card-content>
          <p>Open defects</p>
          <h2>{{ summary.openDefects }}</h2>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="col-12 col-md-3">
      <mat-card>
        <mat-card-content>
          <p>Due soon</p>
          <h2>{{ summary.dueSoonCount }}</h2>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="col-12 col-md-3">
      <mat-card>
        <mat-card-content>
          <p>Non-compliant</p>
          <h2>{{ summary.nonCompliantAircraft }}</h2>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</section>
